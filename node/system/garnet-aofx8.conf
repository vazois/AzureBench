{
  "Address": "$eth1",
  "Port": $port,
  "EnableCluster": true,
  "EnableStorageTier": false,
  "IndexSize": "1g",
  "LogMemorySize": "16g",
  "GossipSamplePercent": 50,
  "MetricsSamplingFrequency": 5,

  /* AOF Config */
  "EnableAOF": true,
  "UseAofNullDevice": true,
  "FastAofTruncate": true,
  "CommitFrequencyMs": -1,
  "AofPhysicalSublogCount": 8,
  /*IMPORTANT: To minimize shipping delay*/
  "ReplicaSyncDelayMs": 0,  
  "ReplicationOffsetMaxLag": 0,
  "AofTailWitnessFreqMs": 0,
  "AofReplayMaxDrift": 1024,  
  "ReplicaSyncTimeout": 60,
  "AofMemorySize": "16g",
  "AofPageSize": "128m",
}