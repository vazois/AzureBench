# Valkey/Redis - AOF on Ramdisk Cluster Configuration
# Placeholders: $eth1 (resolved per-node), $port (resolved per-instance)
# Requires: setup-ramdisk.sh to mount ramdisk before starting

bind $eth1
port $port
protected-mode no
daemonize yes
logfile /home/guser/valkey-cluster/$port/valkey.log
dir $ramdisk/valkey-cluster/$port

# Cluster
cluster-enabled yes
cluster-config-file nodes-$port.conf
cluster-node-timeout 5000
cluster-announce-ip $eth1

# Persistence (AOF on ramdisk)
save ""
appendonly yes
appendfsync no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-timestamp-enabled no

# Memory
maxmemory-policy allkeys-lru

# Performance
io-threads 6
io-threads-do-reads yes
tcp-backlog 16384
hz 100
