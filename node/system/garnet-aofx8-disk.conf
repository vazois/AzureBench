{
  "Address": "$eth1",
  "Port": $port,
  "EnableCluster": true,
  "EnableStorageTier": false,
  "IndexSize": "1g",
  "LogMemorySize": "16g",
  "GossipSamplePercent": 50,
  "MetricsSamplingFrequency": 5,

  /* AOF Config */
  "EnableAOF": true,
  "UseAofNullDevice": false,
  "FastAofTruncate": true,
  "CommitFrequencyMs": -1,
  "AofPhysicalSublogCount": 8,
  "AofMemorySize" : "1g",
  "AofPageSize" : "128m"  
}