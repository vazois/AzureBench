{
  "Address": "$eth1",
  "Port": $port,
  "EnableCluster": true,
  "EnableStorageTier": false,
  "IndexSize": "1g",
  "LogMemorySize": "16g",
  "GossipSamplePercent": 50,
  "MetricsSamplingFrequency": 5,

  /* AOF Config */
  "EnableAOF": true,
  "UseAofNullDevice": true,
  "FastAofTruncate": true,
  "CommitFrequencyMs": -1,
  "AofPhysicalSublogCount": 16,
  "ReplicaSyncDelayMs": 0,
  "ReplicationOffsetMaxLag": 262144,
  "AofReplayMaxDrift": 262144,
  "AofTailWitnessFreqMs": 0,
  "ReplicaSyncTimeout": 60  
}