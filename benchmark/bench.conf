# Benchmark configuration
# Lines starting with # are comments

# SSH connection
SshUser=guser
ClientMachineCount=1
ClientMachineHostnames=[vm0.ds16v2client.southcentralus.cloudapp.azure.com]
Multiplier=1

# Benchmark parameters
Server=10.5.1.10
Port=7000
Threads=1
Runtime=15
ClusterBench=true

# Use a connection pool for every worker
# If not set to true every benchmark instance wii create a single connection per shard per thread
# e.g shards = 6, threads = 8 => 48 workers/connections
Pool=true
# Broadcast requests across collection pool for every worker and wait for response
Pipeline=false

# Operation type (optional, e.g., GET, SET, MGET, MSET)
Op=SET

# Data parameters
#DbSize=1024
#DbSize=32768
DbSize=262144
#DbSize=1048576
# KeyLength=16
ValueLength=256
BatchSize=1

# Additional arguments (optional)
# ExtraArgs=--db-size 1000000
