# Benchmark configuration
# Lines starting with # are comments

# SSH connection
SshUser=guser
ClientMachineCount=[100, 25, 25, 25, 25, 25, 25]
ClientMachineHostnames=[vm0.fs4v2client100.southcentralus.cloudapp.azure.com, vm0.fs4v2client25.southcentralus.cloudapp.azure.com, vm0.es4v6client.southcentralus.cloudapp.azure.com, vm0.ds4v6client.southcentralus.cloudapp.azure.com, vm0.es4v5client.southcentralus.cloudapp.azure.com, vm0.ds4v5client.southcentralus.cloudapp.azure.com, vm0.bs4v2client.southcentralus.cloudapp.azure.com]
# ClientMachineCount=[1]
# ClientMachineHostnames=[vm0.bs4v2client.southcentralus.cloudapp.azure.com]
Multiplier=1

# Benchmark parameters
Server=10.5.128.4
Port=7000
Threads=64
Runtime=15
ClusterBench=true

# Use a connection pool for every worker
# If not set to true every benchmark instance wii create a single connection per shard per thread
# e.g shards = 6, threads = 8 => 48 workers/connections
Pool=true
# Broadcast requests across collection pool for every worker and wait for response
Broadcast=false

# Operation type (optional, e.g., GET, SET, MGET, MSET)
Op=SET

# Data parameters
#DbSize=1024
# 7813 * 128 ~ 1,000,000
#DbSize=7813
# 13514*74 ~ 1,000,000
#DbSize=13514
# 27028*37 ~ 1,000,000
DbSize=27028
#DbSize=18519
#DbSize=166667
#DbSize=1024
#DbSize=32768
#DbSize=262144
#DbSize=1048576
KeyLength=8
ValueLength=256
BatchSize=256

# Additional arguments (optional)
ExtraArgs=--replica-ops-percent 0